<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #fffbeb;
      --card: #ffffff;
      --line: #fde68a;
      --text: #1f2937;
      --muted: #6b7280;
      --sub: #9a3412;
      --tag-bg: #fff7ed;
      --tag-line: #fdba74;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 980px;
      background: var(--bg);
      font-family: "Noto Sans CJK SC", "Noto Sans SC", "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
    }

    body {
      padding: 24px;
      background-image:
        radial-gradient(900px 360px at 0% -18%, #fde68a 0%, rgba(253, 230, 138, 0) 70%),
        radial-gradient(760px 290px at 100% -18%, #fdba74 0%, rgba(253, 186, 116, 0) 70%);
    }

    .container { width: 932px; }
    .header { padding: 18px 0 22px; border-bottom: 2px solid var(--line); margin-bottom: 16px; }
    .title { font-size: 38px; line-height: 1.22; letter-spacing: 0.1px; font-weight: 760; margin-bottom: 10px; }
    .header-line { font-size: 23px; line-height: 1.42; color: var(--muted); margin: 2px 0; }

    .rows { display: flex; flex-direction: column; gap: 10px; }

    .row-card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      min-height: 86px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 18px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 5px 18px rgba(120, 53, 15, 0.08);
    }

    .row-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 8px;
      background: var(--accent);
    }

    .row-main { min-width: 0; padding-left: 8px; }
    .row-title { font-size: 28px; line-height: 1.3; font-weight: 730; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .row-subtitle { margin-top: 4px; font-size: 21px; line-height: 1.34; color: var(--sub); white-space: normal; overflow: visible; text-overflow: clip; word-break: break-word; }

    .row-side { justify-self: end; max-width: 320px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .row-tag { font-size: 17px; line-height: 1.2; color: #7c2d12; background: var(--tag-bg); border: 1px solid var(--tag-line); border-radius: 999px; padding: 5px 11px; max-width: 320px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-right { font-size: 23px; line-height: 1.25; color: #9a3412; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; }
  </style>
</head>
<body>
  <div class="container">
    <section class="header">
      <div class="title">{{ page.title }}</div>
      {% for line in page.header_lines %}
      <div class="header-line">{{ line }}</div>
      {% endfor %}
    </section>

    <section class="rows">
      {% for row in page.rows %}
      <div class="row-card" style="--accent: {{ row.accent_css }};">
        <div class="row-main">
          <div class="row-title">{{ row.title }}</div>
          {% if row.subtitle %}<div class="row-subtitle">{{ row.subtitle }}</div>{% endif %}
        </div>
        <div class="row-side">
          {% if row.tag %}<div class="row-tag">{{ row.tag }}</div>{% endif %}
          {% if row.right %}<div class="row-right">{{ row.right }}</div>{% endif %}
        </div>
      </div>
      {% endfor %}
    </section>
  </div>
</body>
</html>
